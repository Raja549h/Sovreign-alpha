services:
  - type: web
    name: sovereign-alpha
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 dashboard.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
