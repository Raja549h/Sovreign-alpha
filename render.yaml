services:
  - type: web
    name: sovereign-alpha-dashboard
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install --no-cache-dir -r requirements-dashboard.txt && python -c "import py_compile; py_compile.compile('dashboard/app.py', doraise=True)"
    startCommand: gunicorn --bind 0.0.0.0:$PORT --preload dashboard.app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FUND_PASSWORD
        sync: false
      - key: RENDER
        value: true
      - key: PYTHON_VERSION
        value: "3.11"