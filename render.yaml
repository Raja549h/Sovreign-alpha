services:
  - type: web
    name: sovereign-alpha-dashboard
    env: python
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements-dashboard.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT dashboard.app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FUND_PASSWORD
        sync: false
      - key: RENDER
        value: true
      - key: PYTHON_VERSION
        value: "3.11.0"