name: Daily Sovereign Alpha Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * 1-5'  # 08:45 IST Mon-Fri (03:15 UTC)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          CEREBRAS_API_KEY=${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_MODEL=gpt-oss-120b
          CEREBRAS_MODEL_FAST=gpt-oss-120b
          DIGEST_EMAIL=${{ secrets.DIGEST_EMAIL }}
          DIGEST_PASSWORD=${{ secrets.DIGEST_PASSWORD }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          FUND_PASSWORD=${{ secrets.FUND_PASSWORD }}
          LOG_LEVEL=WARNING
          NEON_URL=${{ secrets.NEON_URL }}
          EOF

      - name: Run daily pipeline
        run: python automation/master_daily.py
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
          DIGEST_PASSWORD: ${{ secrets.DIGEST_PASSWORD }}
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FUND_PASSWORD: ${{ secrets.FUND_PASSWORD }}
          NEON_URL: ${{ secrets.NEON_URL }}

      - name: Init validation tables
        run: |
          python -c "
          from research.storage.research_db import init_validation_tables, init_evolution_tables
          init_validation_tables()
          init_evolution_tables()
          "

      - name: Run observation validation (30/90/180-day reviews)
        run: |
          python -c '
          from research.auto_review_engine import AutoReviewEngine
          engine = AutoReviewEngine()
          results = engine.run_scheduled_reviews()
          import json; print(json.dumps(results, indent=2))
          '
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}

      - name: Commit and push live data updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/live_market_data.json data/live_signals.json
          git commit -m "chore(data): auto-update live market intelligence [skip ci]" || echo "No changes to commit"
          git push


      - name: Run edge scorecard calculation
        run: |
          python -c '
          from research.observation_registry import ObservationRegistry
          reg = ObservationRegistry()
          score = reg.calculate_edge_score()
          import json; print(json.dumps(score, indent=2))
          '

      - name: Fetch FII flow data
        run: |
          python -c '
          from research.fii_intelligence import FIIIntelligence
          fii = FIIIntelligence()
          result = fii.fetch_daily_fii_flows()
          import json; print(json.dumps(result, indent=2, default=str))
          '

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: |
            automation/logs/
            results/
          retention-days: 7