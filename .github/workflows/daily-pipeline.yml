name: Daily Sovereign Alpha Pipeline

on:
  schedule:
    - cron: '15 3 * * 1-5'  # 08:45 IST Mon-Fri (03:15 UTC)
  workflow_dispatch:  # Manual trigger button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          DIGEST_EMAIL=${{ secrets.DIGEST_EMAIL }}
          DIGEST_PASSWORD=${{ secrets.DIGEST_PASSWORD }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          FUND_PASSWORD=${{ secrets.FUND_PASSWORD }}
          LOG_LEVEL=WARNING
          EOF

      - name: Run daily pipeline
        run: |
          python automation/master_daily.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
          DIGEST_PASSWORD: ${{ secrets.DIGEST_PASSWORD }}
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FUND_PASSWORD: ${{ secrets.FUND_PASSWORD }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: |
            automation/logs/
            results/
          retention-days: 30