name: Deploy to Hugging Face Spaces

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate requirements
        run: |
          echo "Checking critical dependencies..."
          for pkg in beautifulsoup4 flask yfinance pandas requests; do
            grep -q "$pkg" requirements-docker.txt && echo "  OK: $pkg" || echo "  MISSING: $pkg not in requirements-docker.txt"
          done

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub -q
          python - <<'PYEOF'
          from huggingface_hub import HfApi
          import os, sys

          token = os.environ.get('HF_TOKEN')
          if not token:
              print("::error::HF_TOKEN secret not set — add it to GitHub repo secrets")
              sys.exit(1)

          api = HfApi(token=token)

          print(f"Verifying HF token access...")
          try:
              who = api.whoami()
              print(f"  Authenticated as: {who.get('name', 'unknown')}")
          except Exception as e:
              print(f"::error::HF token validation failed: {e}")
              sys.exit(1)

          repo_id = "svrn-alpha/soverignalpha"

          print(f"Ensuring HF Space exists: {repo_id}...")
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  exist_ok=True,
              )
              print(f"  Space ready")
          except Exception as e:
              print(f"::warning::Could not create space (may already exist): {e}")

          print(f"Uploading to {repo_id}...")
          try:
              api.upload_folder(
                  folder_path=".",
                  repo_id=repo_id,
                  repo_type="space",
                  ignore_patterns=[
                      ".git*",
                      ".venv/",
                      "venv/",
                      "__pycache__/",
                      "*.pyc",
                      "research/data/filings/",
                      "research/data/transcripts/",
                      "logs/",
                      "*.log",
                      "exports/",
                      ".env",
                      "SUMMARY.md",
                      "backtesting/",
                      "documents/",
                      "demo/",
                      "security/",
                      "requirements-pipeline.txt"
                  ]
              )
              print("Deployed to HF Spaces successfully")
          except Exception as e:
              print(f"::error::HF upload failed: {e}")
              sys.exit(1)
          PYEOF