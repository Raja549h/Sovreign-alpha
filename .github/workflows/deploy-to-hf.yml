name: Deploy to Hugging Face Spaces

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub -q
          python - <<'PYEOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ.get('HF_TOKEN')
          if not token:
              print("::error::HF_TOKEN secret not set — add it to GitHub repo secrets")
              exit(1)

          api = HfApi(token=token)

          api.upload_folder(
              folder_path=".",
              repo_id="Demonsatan/soverignalpha",
              repo_type="space",
              ignore_patterns=[
                  ".git*",
                  ".venv/",
                  "venv/",
                  "__pycache__/",
                  "*.pyc",
                  "research/data/filings/",
                  "research/data/transcripts/",
                  "logs/",
                  "*.log",
                  "exports/",
                  ".env",
                  "SUMMARY.md",
                  "backtesting/",
                  "documents/",
                  "demo/",
                  "security/",
                  "requirements-pipeline.txt"
              ]
          )
          print("Deployed to HF Spaces successfully")
          PYEOF