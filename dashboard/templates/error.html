<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Alpha — Error {{ error_code }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-box {
            background: #111;
            border: 1px solid #1e1e1e;
            border-left: 3px solid #ff4444;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            border-radius: 2px;
            text-align: center;
        }
        .error-box h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #ff4444;
            font-family: 'Consolas', monospace;
            margin-bottom: 0.5rem;
        }
        .error-box .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1.5rem;
        }
        .error-box .details {
            font-size: 0.75rem;
            color: #666;
            background: #0a0a0a;
            padding: 1rem;
            border-radius: 2px;
            margin-bottom: 1.5rem;
            text-align: left;
            font-family: 'Consolas', monospace;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        .error-box a {
            display: inline-block;
            background: #00d4aa;
            color: #000;
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .error-box a:hover {
            background: #00b894;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>{{ error_code }}</h1>
        <div class="subtitle">{{ error_message }}</div>
        {% if error_code == 401 or error_code == 403 %}
        <a href="/login">Return to Login</a>
        {% else %}
        <a href="/">Return to Dashboard</a>
        {% endif %}
    </div>
</body>
</html>
