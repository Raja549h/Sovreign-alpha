<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Alpha - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --bg-tertiary: #1a1a1a;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --danger: #ff4444;
            --warning: #ffaa00;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border: #2a2a2a;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 2px;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 2rem;
            font-weight: 300;
            color: var(--text-primary);
        }
        
        .header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .stat-card label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.5rem;
            color: var(--accent);
        }
        
        .stat-card .value.danger {
            color: var(--danger);
        }
        
        .stat-card .value.warning {
            color: var(--warning);
        }
        
        .stat-card .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .gauge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .gauge {
            position: relative;
            width: 200px;
            height: 200px;
        }
        
        .gauge-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--accent) 0%,
                var(--accent) var(--percentage, 75%),
                var(--bg-tertiary) var(--percentage, 75%),
                var(--bg-tertiary) 100%
            );
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .gauge-inner {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .gauge-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        .gauge-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            background: var(--accent-dim);
        }
        
        .btn.danger {
            background: var(--danger);
        }
        
        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .table-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-header h2 {
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem 1.5rem;
            text-align: left;
        }
        
        th {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
        
        tr {
            border-bottom: 1px solid var(--border);
        }
        
        tr:last-child {
            border-bottom: none;
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status-badge.approved {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent);
        }
        
        .status-badge.vetoed {
            background: rgba(255, 68, 68, 0.15);
            color: var(--danger);
        }
        
        .row-approved {
            border-left: 3px solid var(--accent);
        }
        
        .row-vetoed {
            border-left: 3px solid var(--danger);
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .chart-card h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        
        .proof-list {
            display: grid;
            gap: 1rem;
        }
        
        .proof-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .proof-info h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
            font-family: monospace;
            color: var(--accent);
        }
        
        .proof-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .proof-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .verified-badge {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.85rem;
            }
            
            th, td {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">◈ SOVEREIGN ALPHA</div>
        <div class="nav-links">
            <a href="/" class="active">Home</a>
            <a href="/decisions">Decisions</a>
            <a href="/proofs">Proofs</a>
            <a href="/performance">Performance</a>
        </div>
    </nav>
    
    {% block content %}{% endblock %}
    
    <script>
        function refreshData() {
            fetch('/api/refresh', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    }
                })
                .catch(err => console.error('Refresh failed:', err));
        }
        
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
