<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Alpha — Institutional Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0d0d0d;
            --bg-tertiary: #141414;
            --bg-card: #111111;
            --border: #1e1e1e;
            --border-light: #2a2a2a;
            --accent: #00d4aa;
            --accent-dim: #00a888;
            --accent-glow: rgba(0, 212, 170, 0.15);
            --danger: #e03030;
            --danger-dim: rgba(224, 48, 48, 0.15);
            --warning: #e0a020;
            --warning-dim: rgba(224, 160, 32, 0.15);
            --info: #4090e0;
            --info-dim: rgba(64, 144, 224, 0.15);
            --text-primary: #e0e0e0;
            --text-secondary: #707070;
            --text-dim: #505050;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
            --font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.4;
            min-height: 100vh;
        }

        .top-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.4rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--text-dim);
        }

        .top-bar .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .nav-brand {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 0.8rem 1.5rem 0.8rem 0;
            border-right: 1px solid var(--border);
            margin-right: 0.5rem;
            font-family: var(--font-mono);
        }

        .nav-links { display: flex; gap: 0; }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.8rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover { color: var(--text-primary); background: var(--bg-tertiary); }
        .nav-links a.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-tertiary);
        }

        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .nav-right a { color: var(--text-secondary); text-decoration: none; }
        .nav-right a:hover { color: var(--accent); }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .page-header h1 {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-primary);
        }

        .page-header .timestamp {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 2px;
        }

        .stat-box label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }

        .stat-box .value {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--accent);
        }

        .stat-box .value.danger { color: var(--danger); }
        .stat-box .value.warning { color: var(--warning); }
        .stat-box .value.info { color: var(--info); }

        .stat-box .sub {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 0.15rem;
        }

        .regime-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 2px;
            font-size: 0.7rem;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        .regime-badge.RISK_ON { background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent-dim); }
        .regime-badge.RISK_OFF { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); }
        .regime-badge.NEUTRAL { background: var(--warning-dim); color: var(--warning); border: 1px solid var(--warning); }

        .signal-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            font-size: 0.65rem;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .signal-badge.BUY { background: var(--accent-glow); color: var(--accent); }
        .signal-badge.SELL { background: var(--danger-dim); color: var(--danger); }
        .signal-badge.HOLD { background: var(--warning-dim); color: var(--warning); }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            margin-bottom: 0.75rem;
        }

        .panel-header {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
        }

        .panel-header h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .panel-body { padding: 0; }
        .panel-body.padded { padding: 1rem; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        th {
            background: var(--bg-tertiary);
            color: var(--text-dim);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            padding: 0.5rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }

        td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 0.75rem;
        }

        tr:hover { background: var(--bg-tertiary); }
        tr:last-child td { border-bottom: none; }

        .ticker-cell {
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-mono);
        }

        .mono { font-family: var(--font-mono); }

        .btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            font-family: var(--font-sans);
        }

        .btn:hover { background: var(--accent-dim); }
        .btn.danger { background: var(--danger); color: #fff; }
        .btn.outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }
        .btn.outline:hover { border-color: var(--accent); color: var(--accent); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 2px;
            height: 300px;
        }

        .ticker-strip {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.3rem 1.5rem;
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        .ticker-item {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            white-space: nowrap;
        }

        .ticker-item .sym { color: var(--text-secondary); font-weight: 600; }
        .ticker-item .price { color: var(--text-primary); }
        .ticker-item .change.up { color: var(--accent); }
        .ticker-item .change.down { color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }

        .hash {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            word-break: break-all;
        }

        .thesis-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 500px;
        }

        @media (max-width: 1024px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .nav { flex-wrap: wrap; }
            .nav-links { flex-wrap: wrap; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .ticker-strip { display: none; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div><span class="status-dot"></span>SOVEREIGN ALPHA v2.0 — INSTITUTIONAL INTELLIGENCE PIPELINE</div>
        <div id="clock"></div>
    </div>

    <div class="ticker-strip" id="ticker-strip">
        <div class="ticker-item"><span class="sym">SPX</span><span class="price" id="t-spx">—</span><span class="change" id="t-spx-c">—</span></div>
        <div class="ticker-item"><span class="sym">VIX</span><span class="price" id="t-vix">—</span><span class="change" id="t-vix-c">—</span></div>
        <div class="ticker-item"><span class="sym">DXY</span><span class="price" id="t-dxy">—</span><span class="change" id="t-dxy-c">—</span></div>
        <div class="ticker-item"><span class="sym">TNX</span><span class="price" id="t-tnx">—</span><span class="change" id="t-tnx-c">—</span></div>
        <div class="ticker-item"><span class="sym">GC</span><span class="price" id="t-gc">—</span><span class="change" id="t-gc-c">—</span></div>
        <div class="ticker-item"><span class="sym">CL</span><span class="price" id="t-cl">—</span><span class="change" id="t-cl-c">—</span></div>
        <div class="ticker-item"><span class="sym">NSEI</span><span class="price" id="t-nsei">—</span><span class="change" id="t-nsei-c">—</span></div>
    </div>

    <nav class="nav">
        <div class="nav-brand">SOVEREIGN ALPHA</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/decisions" class="{% if request.path == '/decisions' %}active{% endif %}">Decisions</a>
            <a href="/predictions" class="{% if request.path == '/predictions' %}active{% endif %}">Predictions</a>
            <a href="/veto-archive" class="{% if request.path == '/veto-archive' %}active{% endif %}">Veto Archive</a>
            <a href="/proofs" class="{% if request.path == '/proofs' %}active{% endif %}">Proofs</a>
            <a href="/performance" class="{% if request.path == '/performance' %}active{% endif %}">Performance</a>
            <a href="/research" class="{% if request.path.startswith('/research') %}active{% endif %}">Research</a>
            <a href="/upload" class="{% if request.path == '/upload' %}active{% endif %}">Upload</a>
        </div>
        <div class="nav-right">
            {% if session_user %}<span>{{ session_user }}</span>{% endif %}
            <a href="/logout">Logout</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();

        function refreshData() {
            fetch('/api/refresh', {method: 'POST'})
                .then(r => r.json())
                .then(data => { if (data.success) location.reload(); })
                .catch(err => console.error('Refresh failed:', err));
        }
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
