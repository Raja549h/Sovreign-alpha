<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Alpha — Institutional Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(0, 201, 165, 0.25); color: #fff; }
        :root {
            --bg-primary: #0a0b0e;
            --bg-secondary: #0f1115;
            --bg-tertiary: #14161c;
            --bg-card: #111318;
            --bg-elevated: #191b22;
            --border: #1e2028;
            --border-light: #282a32;
            --accent: #00c9a5;
            --accent-dim: rgba(0, 201, 165, 0.12);
            --accent-glow: rgba(0, 201, 165, 0.06);
            --danger: #e04444;
            --danger-dim: rgba(224, 68, 68, 0.12);
            --warning: #d4a030;
            --warning-dim: rgba(212, 160, 48, 0.12);
            --info: #4488cc;
            --info-dim: rgba(68, 136, 204, 0.12);
            --text-primary: #d8dae0;
            --text-secondary: #80848f;
            --text-dim: #585c66;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            --font-sans: -apple-system, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --radius: 4px;
            --transition: 180ms ease;
        }
        html { font-size: 15px; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.45;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        [data-tip] { position: relative; cursor: help; }
        [data-tip]:hover:after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%);
            background: var(--bg-elevated); color: var(--text-primary);
            border: 1px solid var(--border); padding: 0.25rem 0.5rem;
            font-size: 0.7rem; font-family: var(--font-mono);
            white-space: nowrap; z-index: 999; pointer-events: none;
            border-radius: 2px;
        }

        .top-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.3rem 1.25rem;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.7rem; font-family: var(--font-mono);
            color: var(--text-dim); height: 32px;
        }
        .top-bar .status-dot {
            display: inline-block; width: 5px; height: 5px;
            border-radius: 50%; background: var(--accent);
            margin-right: 0.35rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
        .top-bar .brand { letter-spacing: 1.5px; }
        .top-bar .clock { color: var(--text-secondary); }

        .ticker-strip {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 0.3rem 1.25rem;
            display: flex; gap: 1.75rem;
            overflow-x: auto; font-family: var(--font-mono);
            font-size: 0.7rem; height: 32px;
            align-items: center;
        }
        .ticker-strip::-webkit-scrollbar { display: none; }
        .ticker-item { display: flex; gap: 0.3rem; white-space: nowrap; }
        .ticker-item .sym { color: var(--text-dim); font-weight: 600; }
        .ticker-item .price { color: var(--text-primary); }
        .ticker-item .change { font-weight: 600; }
        .ticker-item .change.up { color: var(--accent); }
        .ticker-item .change.down { color: var(--danger); }

        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 1.25rem;
            display: flex; align-items: center;
            height: 42px;
        }
        .nav-brand {
            font-size: 0.82rem; font-weight: 700;
            color: var(--accent); letter-spacing: 2px;
            text-transform: uppercase; font-family: var(--font-mono);
            padding: 0 1.25rem 0 0;
            border-right: 1px solid var(--border);
            margin-right: 0.5rem;
            white-space: nowrap;
        }
        .nav-links { display: flex; gap: 0; height: 100%; }
        .nav-links a {
            color: var(--text-dim); text-decoration: none;
            padding: 0 0.85rem; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.7px;
            transition: all var(--transition);
            display: flex; align-items: center;
            border-bottom: 2px solid transparent;
        }
        .nav-links a:hover { color: var(--text-secondary); background: var(--bg-tertiary); }
        .nav-links a.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-tertiary);
        }
        .nav-right {
            margin-left: auto;
            display: flex; align-items: center; gap: 0.85rem;
            font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-mono);
            white-space: nowrap;
        }
        .nav-right a { color: var(--text-secondary); }
        .nav-right a:hover { color: var(--accent); }
        .nav-right .user { color: var(--text-secondary); }

        .container {
            max-width: 1600px; margin: 0 auto;
            padding: 1rem 1.25rem;
        }
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.85rem; padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            font-size: 1rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-primary);
        }
        .page-header .timestamp {
            font-family: var(--font-mono); font-size: 0.7rem;
            color: var(--text-dim);
        }
        .page-header .actions { display: flex; gap: 0.6rem; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.65rem; margin-bottom: 0.85rem;
        }
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--border);
            padding: 0.7rem 0.9rem;
            transition: border-color var(--transition);
        }
        .stat-box:hover { border-color: var(--border-light); }
        .stat-box.accent { border-left-color: var(--accent); }
        .stat-box.danger { border-left-color: var(--danger); }
        .stat-box.warning { border-left-color: var(--warning); }
        .stat-box.info { border-left-color: var(--info); }
        .stat-box label {
            display: block; font-size: 0.65rem;
            color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.7px; margin-bottom: 0.2rem;
        }
        .stat-box .value {
            font-size: 1.35rem; font-weight: 700;
            font-family: var(--font-mono); color: var(--accent);
        }
        .stat-box .value.danger { color: var(--danger); }
        .stat-box .value.warning { color: var(--warning); }
        .stat-box .value.info { color: var(--info); }
        .stat-box .sub {
            font-size: 0.65rem; color: var(--text-dim);
            margin-top: 0.15rem;
        }

        .regime-badge {
            display: inline-block; padding: 0.15rem 0.55rem;
            font-size: 0.7rem; font-weight: 700;
            font-family: var(--font-mono); letter-spacing: 0.7px;
        }
        .regime-badge.RISK_ON { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
        .regime-badge.RISK_OFF { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); }
        .regime-badge.NEUTRAL { background: var(--warning-dim); color: var(--warning); border: 1px solid var(--warning); }
        .signal-badge {
            display: inline-block; padding: 0.1rem 0.45rem;
            font-size: 0.65rem; font-weight: 700; font-family: var(--font-mono);
        }
        .signal-badge.BUY, .signal-badge.buy, .signal-badge.approved, .signal-badge.cleared { background: var(--accent-dim); color: var(--accent); }
        .signal-badge.SELL, .signal-badge.sell, .signal-badge.vetoed, .signal-badge.rejected { background: var(--danger-dim); color: var(--danger); }
        .signal-badge.HOLD, .signal-badge.hold, .signal-badge.pending, .signal-badge.PENDING { background: var(--warning-dim); color: var(--warning); }
        .signal-badge.active { background: var(--accent-dim); color: var(--accent); }

        .verified-badge { color: var(--accent); font-size: 0.65rem; font-family: var(--font-mono); letter-spacing: 0.5px; }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            margin-bottom: 0.65rem;
        }
        .panel-header {
            padding: 0.55rem 0.9rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-secondary);
        }
        .panel-header h2 {
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: var(--text-secondary);
        }
        .panel-body { padding: 0; }
        .panel-body.padded { padding: 0.9rem; }

        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th {
            background: var(--bg-secondary);
            color: var(--text-dim); font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600;
            padding: 0.5rem 0.7rem; text-align: left;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
        }
        td {
            padding: 0.5rem 0.7rem;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono); font-size: 0.75rem;
        }
        tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
        tr:hover td { background: var(--bg-tertiary); }
        tr:last-child td { border-bottom: none; }
        .ticker-cell { font-weight: 700; color: var(--text-primary); }
        .mono { font-family: var(--font-mono); }
        .hash { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); word-break: break-all; cursor: pointer; }
        .hash:hover { color: var(--accent); }
        .hash.copied { color: var(--accent); }
        .text-right { text-align: right; }
        .value-positive { color: var(--accent); }
        .value-negative { color: var(--danger); }

        .btn {
            background: var(--accent); color: var(--bg-primary);
            border: none; padding: 0.35rem 0.85rem;
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
        }
        .btn:hover { opacity: 0.85; }
        .btn.danger { background: var(--danger); color: #fff; }
        .btn.outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }
        .btn.outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn.small { padding: 0.25rem 0.55rem; font-size: 0.65rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.65rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.65rem; }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.9rem;
            height: 280px;
        }

        .intel-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--border);
            padding: 0.8rem 0.9rem;
            transition: border-color var(--transition);
        }
        .intel-card:hover { border-color: var(--border-light); }
        .intel-card.accent { border-left-color: var(--accent); }
        .intel-card.danger { border-left-color: var(--danger); }
        .intel-card .label {
            font-size: 0.65rem; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.6px;
            margin-bottom: 0.15rem;
        }
        .intel-card .stat {
            font-size: 1.2rem; font-weight: 700; font-family: var(--font-mono);
        }
        .intel-card .stat.accent { color: var(--accent); }
        .intel-card .stat.danger { color: var(--danger); }
        .intel-card .stat.warning { color: var(--warning); }
        .intel-card .stat.info { color: var(--info); }
        .intel-card .note {
            font-size: 0.65rem; color: var(--text-dim);
            margin-top: 0.1rem;
        }

        .conf-bar {
            height: 5px; background: var(--border); margin-top: 0.3rem;
            overflow: hidden;
        }
        .conf-bar .fill {
            height: 100%;
            transition: width 0.6s ease;
        }
        .conf-bar .fill.high { background: var(--accent); }
        .conf-bar .fill.med { background: var(--warning); }
        .conf-bar .fill.low { background: var(--danger); }
        .conf-label { display: flex; justify-content: space-between; font-size: 0.65rem; font-family: var(--font-mono); margin-top: 0.15rem; }
        .conf-label .pct { font-weight: 700; }
        .conf-label .pct.high { color: var(--accent); }
        .conf-label .pct.med { color: var(--warning); }
        .conf-label .pct.low { color: var(--danger); }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-elevated) 50%, var(--bg-card) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-value { height: 1.2rem; width: 60%; margin-bottom: 0.2rem; }
        .skeleton-label { height: 0.65rem; width: 40%; }
        .skeleton-row { height: 2rem; width: 100%; margin-bottom: 2px; }

        .empty-state { text-align: center; padding: 2.5rem; color: var(--text-dim); font-size: 0.85rem; }
        .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }

        .fade-in { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .thesis-text {
            font-size: 0.75rem; color: var(--text-secondary);
            line-height: 1.6; max-width: 500px;
        }

        .severity-tag {
            display: inline-block; padding: 0.08rem 0.35rem;
            font-size: 0.6rem; font-weight: 700; font-family: var(--font-mono);
            text-transform: uppercase;
        }
        .severity-tag.critical { background: rgba(224,68,68,0.2); color: var(--danger); }
        .severity-tag.high { background: rgba(224,68,68,0.12); color: var(--danger); }
        .severity-tag.medium { background: var(--warning-dim); color: var(--warning); }
        .severity-tag.low { background: var(--info-dim); color: var(--info); }
        .severity-tag.info { background: rgba(68,136,204,0.12); color: var(--info); }

        .updated-now { color: var(--accent); }
        .updated-stale { color: var(--warning); }

        .signal-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 2px solid var(--border);
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.4rem;
            font-size: 0.75rem;
        }
        .signal-card:last-child { margin-bottom: 0; }
        .signal-card .sym { font-weight: 700; color: var(--text-primary); }
        .signal-card .reason { color: var(--text-dim); }
        .signal-card.accent { border-left-color: var(--accent); }
        .signal-card.danger { border-left-color: var(--danger); }
        .signal-card.warning { border-left-color: var(--warning); }

        .filter-bar {
            display: flex; gap: 0.6rem; margin-bottom: 0.75rem;
            align-items: center; flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.35rem 0.6rem;
            font-size: 0.7rem; font-family: var(--font-mono);
            outline: none;
        }
        .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
        .filter-bar .count {
            font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-mono);
            margin-left: auto;
        }

        .toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: var(--bg-elevated); border: 1px solid var(--border);
            padding: 0.6rem 1rem; font-size: 0.75rem; font-family: var(--font-mono);
            z-index: 9999; display: none; color: var(--text-primary);
        }
        .toast.show { display: block; animation: fadeIn 0.2s ease; }
        .toast .close { margin-left: 0.85rem; cursor: pointer; color: var(--text-dim); }

        .key-val { display: flex; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
        .key-val:last-child { border-bottom: none; }
        .key-val .key { color: var(--text-dim); }
        .key-val .val { font-family: var(--font-mono); color: var(--text-primary); }
        .key-val .val.accent { color: var(--accent); }
        .key-val .val.danger { color: var(--danger); }

        @media (max-width: 1024px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .nav { flex-wrap: wrap; height: auto; padding: 0.3rem 0.75rem; }
            .nav-links { flex-wrap: wrap; }
            .ticker-strip { display: none; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div><span class="status-dot"></span><span class="brand">SOVEREIGN ALPHA v2.0</span></div>
        <div class="clock" id="clock"></div>
    </div>

    <div class="ticker-strip" id="ticker-strip">
        <div class="ticker-item"><span class="sym">SPX</span><span class="price" id="t-spx">—</span><span class="change" id="t-spx-c"></span></div>
        <div class="ticker-item"><span class="sym">VIX</span><span class="price" id="t-vix">—</span><span class="change" id="t-vix-c"></span></div>
        <div class="ticker-item"><span class="sym">DXY</span><span class="price" id="t-dxy">—</span><span class="change" id="t-dxy-c"></span></div>
        <div class="ticker-item"><span class="sym">10Y</span><span class="price" id="t-tnx">—</span><span class="change" id="t-tnx-c"></span></div>
        <div class="ticker-item"><span class="sym">GOLD</span><span class="price" id="t-gc">—</span><span class="change" id="t-gc-c"></span></div>
        <div class="ticker-item"><span class="sym">WTI</span><span class="price" id="t-cl">—</span><span class="change" id="t-cl-c"></span></div>
        <div class="ticker-item"><span class="sym">NSEI</span><span class="price" id="t-nsei">—</span><span class="change" id="t-nsei-c"></span></div>
    </div>

    <nav class="nav">
        <div class="nav-brand">SOV ALPHA</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/decisions" class="{% if request.path == '/decisions' %}active{% endif %}">Decisions</a>
            <a href="/predictions" class="{% if request.path == '/predictions' %}active{% endif %}">Predictions</a>
            <a href="/veto-archive" class="{% if request.path == '/veto-archive' %}active{% endif %}">Veto Archive</a>
            <a href="/proofs" class="{% if request.path == '/proofs' %}active{% endif %}">Proofs</a>
            <a href="/performance" class="{% if request.path == '/performance' %}active{% endif %}">Performance</a>
            <a href="/research" class="{% if request.path.startswith('/research') %}active{% endif %}">Research</a>
            <a href="/upload" class="{% if request.path == '/upload' %}active{% endif %}">Upload</a>
        </div>
        <div class="nav-right">
            {% if session_user %}<span class="user">{{ session_user }}</span>{% endif %}
            <span data-tip="Last full refresh" id="nav-updated" style="color:var(--text-dim);font-size:0.55rem;">{{ last_updated[:19] if last_updated else '' }}</span>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <div class="toast" id="toast"><span id="toast-msg"></span><span class="close" onclick="hideToast()">&times;</span></div>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateTicker(id, price, change) {
            var el = document.getElementById(id);
            if (!el) return;
            el.textContent = price != null ? price : '—';
            var cEl = document.getElementById(id + '-c');
            if (!cEl) return;
            if (change != null) {
                var c = parseFloat(change);
                cEl.textContent = (c > 0 ? '+' : '') + c.toFixed(2);
                cEl.className = 'change ' + (c >= 0 ? 'up' : 'down');
            } else { cEl.textContent = ''; }
        }

        var macroTickers = {{ macro_tickers | tojson | safe }};
        if (macroTickers && Object.keys(macroTickers).length > 0) {
            updateTicker('t-spx', macroTickers.spx_price, macroTickers.spx_change);
            updateTicker('t-vix', macroTickers.vix, null);
            updateTicker('t-dxy', macroTickers.dxy, macroTickers.dxy_change);
            updateTicker('t-tnx', macroTickers.treasury_10y, null);
            updateTicker('t-gc', macroTickers.gold, macroTickers.gold_change);
            updateTicker('t-cl', macroTickers.oil_wti, macroTickers.oil_change);
            updateTicker('t-nsei', macroTickers.nsei, macroTickers.nsei_change);
        }

        setInterval(function() {
            fetch('/api/ticker-refresh', {method:'POST'})
                .then(function(r) { if (!r.ok) return; r.json().then(function(data) {
                    if (!data || !data.tickers) return;
                    var t = data.tickers;
                    updateTicker('t-spx', t.spx_price, t.spx_change);
                    updateTicker('t-vix', t.vix, null);
                    updateTicker('t-dxy', t.dxy, t.dxy_change);
                    updateTicker('t-tnx', t.treasury_10y, null);
                    updateTicker('t-gc', t.gold, t.gold_change);
                    updateTicker('t-cl', t.oil_wti, t.oil_change);
                    updateTicker('t-nsei', t.nsei, t.nsei_change);
                });}).catch(function(){});
        }, 60000);

        document.addEventListener('click', function(e) {
            var el = e.target.closest('.hash');
            if (!el) return;
            var text = el.getAttribute('data-full') || el.textContent;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    el.classList.add('copied');
                    showToast('Copied: ' + text.substring(0,16) + '...');
                    setTimeout(function() { el.classList.remove('copied'); }, 2000);
                }).catch(function(){});
            }
        });

        function showToast(msg) {
            var t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 3000);
        }
        function hideToast() { document.getElementById('toast').classList.remove('show'); }

        function filterTable(inputId, tableId) {
            var input = document.getElementById(inputId);
            var table = document.getElementById(tableId);
            if (!input || !table) return;
            input.addEventListener('keyup', function() {
                var q = this.value.toLowerCase();
                var rows = table.querySelectorAll('tbody tr');
                var count = 0;
                rows.forEach(function(r) {
                    var match = r.textContent.toLowerCase().indexOf(q) > -1;
                    r.style.display = match ? '' : 'none';
                    if (match) count++;
                });
                var countEl = document.getElementById(tableId + '-count');
                if (countEl) countEl.textContent = count + ' / ' + rows.length;
            });
        }

        function refreshDashboard() {
            fetch('/api/refresh', {method: 'POST'})
                .then(function(r) { if (!r.ok) return; r.json().then(function(data) {
                    if (!data.success) return;
                    var navUpdated = document.getElementById('nav-updated');
                    if (navUpdated && data.timestamp) navUpdated.textContent = data.timestamp.substring(0,19).replace('T',' ');
                    var s = data.stats || {};
                    var statEls = document.querySelectorAll('.stat-refresh');
                    statEls.forEach(function(el) {
                        var key = el.getAttribute('data-key');
                        if (key && s[key] !== undefined) {
                            var val = s[key];
                            if (key.indexOf('drawdown') > -1 || key.indexOf('alpha') > -1 || key.indexOf('fee') > -1) {
                                el.textContent = '$' + Math.round(val);
                            } else if (key.indexOf('rate') > -1 || key.indexOf('efficiency') > -1) {
                                el.textContent = Number(val).toFixed(1) + '%';
                            } else { el.textContent = val; }
                        }
                    });
                    var regimeEl = document.getElementById('regime-badge');
                    if (regimeEl && data.regime) {
                        regimeEl.textContent = data.regime;
                        regimeEl.className = 'regime-badge ' + (data.regime || 'NEUTRAL');
                    }
                    var regimeConfEl = document.getElementById('regime-confidence');
                    if (regimeConfEl && data.regime_confidence) regimeConfEl.textContent = 'Confidence: ' + data.regime_confidence;
                    var predBody = document.getElementById('prediction-table-body');
                    if (predBody && data.predictions && data.predictions.length > 0) {
                        var html = '';
                        data.predictions.slice(0,8).forEach(function(p) {
                            var sc = (p.status === 'cleared') ? 'BUY' : 'SELL';
                            var conf = (p.confidence_score || 0);
                            if (conf <= 1) conf = Math.round(conf * 100);
                            html += '<tr><td class="ticker-cell">' + (p.asset || p.ticker || '') + '</td>'
                                 + '<td><span class="signal-badge ' + sc + '">' + (p.status || '') + '</span></td>'
                                 + '<td>' + conf + '%</td>'
                                 + '<td>' + (p.actual_outcome || 'Pending') + '</td>'
                                 + '<td class="mono">' + ((p.timestamp || '').substring(0,10)) + '</td></tr>';
                        });
                        predBody.innerHTML = html;
                    }
                    var vetoBody = document.getElementById('veto-table-body');
                    if (vetoBody && data.vetoes && data.vetoes.length > 0) {
                        var html = '';
                        data.vetoes.slice(0,6).forEach(function(v) {
                            var correct = v.veto_correct === true ? 'Yes' : (v.veto_correct === false ? 'No' : 'Pending');
                            var risk = (v.risk_score || 0);
                            if (risk <= 1) risk = Math.round(risk * 100);
                            html += '<tr><td class="ticker-cell">' + (v.asset || '') + '</td>'
                                 + '<td>' + risk + '%</td>'
                                 + '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (v.rejection_reason || v.veto_reason || '—') + '</td>'
                                 + '<td>' + (v.avoided_drawdown || '—') + '</td>'
                                 + '<td>' + correct + '</td></tr>';
                        });
                        vetoBody.innerHTML = html;
                    }
                });}).catch(function() {});
            });
        }
        setInterval(refreshDashboard, 60000);
        refreshDashboard();
    </script>
</body>
</html>
