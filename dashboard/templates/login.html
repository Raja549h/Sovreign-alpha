<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Alpha — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #111;
            border: 1px solid #1e1e1e;
            padding: 2.5rem;
            width: 380px;
            border-radius: 2px;
        }
        .login-box h1 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #00d4aa;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
            font-family: 'Consolas', monospace;
        }
        .login-box .subtitle {
            font-size: 0.7rem;
            color: #505050;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        .login-box label {
            display: block;
            font-size: 0.65rem;
            color: #707070;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
        }
        .login-box input[type="password"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: #0d0d0d;
            border: 1px solid #1e1e1e;
            color: #e0e0e0;
            font-size: 0.85rem;
            border-radius: 2px;
            margin-bottom: 1.5rem;
            font-family: 'Consolas', monospace;
        }
        .login-box input[type="password"]:focus {
            outline: none;
            border-color: #00d4aa;
        }
        .login-box button {
            width: 100%;
            padding: 0.6rem;
            background: #00d4aa;
            color: #000;
            border: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
        }
        .login-box button:hover { background: #00a888; }
        .error {
            background: rgba(224, 48, 48, 0.15);
            border: 1px solid #e03030;
            color: #e03030;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            margin-bottom: 1.5rem;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Sovereign Alpha</h1>
        <div class="subtitle">Institutional Intelligence Pipeline</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Fund Password</label>
            <input type="password" name="password" placeholder="Enter fund password" autofocus required>
            <button type="submit">Authenticate</button>
        </form>
    </div>
</body>
</html>
