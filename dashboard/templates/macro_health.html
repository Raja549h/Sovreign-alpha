{% extends "base.html" %}
{% block content %}
<div class="container fade-in">
    <div class="page-header">
        <h1>India Macro Health Scorecard</h1>
        <span class="timestamp" id="health-timestamp">Loading...</span>
    </div>

    <div class="composite-box" id="compositeBox" style="text-align:center;padding:1.5rem;border:1px solid #1e1e1e;background:#0d0d0d;margin-bottom:1rem;">
        <div style="font-size:0.7rem;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:0.5rem;">India Macro Health</div>
        <div style="font-size:2.5rem;font-weight:700;font-family:var(--font-mono);" id="compositeScore">-- / 100</div>
        <div style="font-size:0.75rem;margin-top:0.3rem;font-family:var(--font-mono);" id="compositeLabel">Loading indicators...</div>
    </div>

    <div class="indicators-grid" id="indicatorsGrid" style="display:grid;grid-template-columns:repeat(2, 1fr);gap:0.65rem;margin-bottom:1rem;"></div>

    <div class="panel" id="regimeImplicationPanel" style="display:none;">
        <div class="panel-header">
            <h2>Regime Implication</h2>
        </div>
        <div class="panel-body padded" style="font-family:var(--font-mono);font-size:0.75rem;line-height:1.7;color:#b0b8c0;" id="regimeImplication"></div>
    </div>
</div>

<script>
function loadMacroHealth() {
    const grid = document.getElementById('indicatorsGrid');
    const compositeEl = document.getElementById('compositeScore');
    const compositeLabel = document.getElementById('compositeLabel');
    const compositeBox = document.getElementById('compositeBox');
    const implicationPanel = document.getElementById('regimeImplicationPanel');
    const implicationText = document.getElementById('regimeImplication');

    fetch('/api/macro/macro-health')
        .then(r => r.json())
        .then(data => {
            if (!data.success) throw new Error(data.error || 'API error');
            const report = data.report;
            const indicators = report.indicators || [];
            const score = report.composite_score || 0;
            const implication = report.regime_implication || '';

            document.getElementById('health-timestamp').textContent = report.calculated_at || new Date().toISOString().slice(0,19);

            compositeEl.textContent = score + ' / 100';
            let color = '#ff4444';
            let label = 'RED — Stress Conditions';
            if (score >= 70) { color = 'var(--accent)'; label = 'GREEN — Stable Macro Environment'; }
            else if (score >= 50) { color = 'var(--warning)'; label = 'AMBER — Moderate Risk Indicators'; }
            compositeBox.style.borderColor = color;
            compositeEl.style.color = color;
            compositeLabel.textContent = label;
            compositeLabel.style.color = color;

            grid.innerHTML = indicators.map(ind => {
                let statusColor = '#ff4444';
                let statusLabel = 'RED';
                if (ind.status === 'GREEN') { statusColor = 'var(--accent)'; statusLabel = 'GREEN'; }
                else if (ind.status === 'AMBER') { statusColor = 'var(--warning)'; statusLabel = 'AMBER'; }
                const arrow = ind.direction === 'up' ? '▲' : ind.direction === 'down' ? '▼' : '—';
                const arrowColor = ind.direction === 'up' ? 'var(--danger)' : ind.direction === 'down' ? 'var(--accent)' : '#555';
                return '<div class="indicator-card" style="background:#0d0d0d;border:1px solid #1e1e1e;padding:0.75rem;border-left:3px solid ' + statusColor + ';">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;">' +
                    '<span style="font-size:0.65rem;color:#555;text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font-mono);">' + escapeHtml(ind.name) + '</span>' +
                    '<span class="status-pill" style="font-size:0.6rem;color:' + statusColor + ';border:1px solid ' + statusColor + ';padding:0.1rem 0.4rem;font-family:var(--font-mono);">' + statusLabel + '</span>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;align-items:baseline;">' +
                    '<span style="font-size:1.3rem;font-weight:700;font-family:var(--font-mono);color:var(--text-primary);">' + escapeHtml(ind.value || '—') + '</span>' +
                    '<span style="font-size:0.9rem;color:' + arrowColor + ';">' + arrow + '</span>' +
                    '</div>' +
                    '<div style="font-size:0.65rem;color:#666;margin-top:0.3rem;font-family:var(--font-mono);">' + escapeHtml(ind.observation || '') + '</div>' +
                    '</div>';
            }).join('');

            if (implication) {
                implicationPanel.style.display = 'block';
                implicationText.textContent = implication;
            }
        })
        .catch(err => {
            grid.innerHTML = '<div class="panel-body padded" style="grid-column:1/-1;text-align:center;color:var(--danger);">Failed to load: ' + escapeHtml(err.message) + '</div>';
        });
}

function escapeHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadMacroHealth();
setInterval(loadMacroHealth, 120000);
</script>

<style>
.indicator-card { transition: border-color 0.15s; }
.indicator-card:hover { border-color: #333; }
.status-pill { border-radius: 2px; letter-spacing: 0.3px; }
</style>
{% endblock %}
