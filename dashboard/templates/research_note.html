{% extends "base.html" %}
{% block content %}
<div class="container fade-in">
    <div class="page-header">
        <div>
            <h1>{{ note.note_reference }}</h1>
            <span class="timestamp">{{ note.title }}</span>
        </div>
        <div class="actions">
            <a href="/research/export/{{ note.note_reference }}" class="btn outline small">Download PDF</a>
            <a href="/research" class="btn outline small">Back to Research</a>
        </div>
    </div>
    <div class="panel">
        <div class="panel-body padded" style="font-size:0.75rem;line-height:1.7;color:var(--text-secondary);">
            {{ note.full_content|safe }}
        </div>
    </div>
</div>
{% endblock %}
